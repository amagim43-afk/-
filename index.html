<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>번호 추첨기</title>

  <style>
    body {
      text-align: center;
      font-family: sans-serif;
      margin-top: 80px;
      background: #000;
      color: white;
    }

    h1 {
      font-size: 32px;
    }

    input {
      font-size: 20px;
      padding: 10px;
      width: 80px;
      margin: 5px;
    }

    button {
      font-size: 22px;
      padding: 12px 30px;
      margin-top: 20px;
      border: none;
      border-radius: 10px;
      background: #4CAF50;
      color: white;
    }

    #result {
      font-size: 60px;
      margin-top: 40px;
    }
  </style>
</head>

<body>

<h1>번호 추첨기 🎲</h1>

<input id="min" type="number" placeholder="최소">
<input id="max" type="number" placeholder="최대">

<br>

<button onclick="draw()">추첨!</button>

<div id="result">?</div>

<script>
function draw() {
  let min = Number(document.getElementById("min").value);
  let max = Number(document.getElementById("max").value);

  if (min >= max) {
    alert("최소값이 최대값보다 작아야 함!");
    return;
  }

  let num = Math.floor(Math.random() * (max - min + 1)) + min;

  document.getElementById("result").innerText = num;
}
</script>

</body>
</html>
