<script>
let numbers = [];
let history = [];
let isReady = false;

// 🎯 편향 제거된 crypto 랜덤
function getCryptoRandomIndex(max) {
  const maxUint32 = 4294967295;
  const limit = maxUint32 - (maxUint32 % max);

  const array = new Uint32Array(1);

  do {
    crypto.getRandomValues(array);
  } while (array[0] >= limit);

  return array[0] % max;
}

function init() {
  let min = Number(document.getElementById("min").value);
  let max = Number(document.getElementById("max").value);

  if (!Number.isFinite(min) || !Number.isFinite(max)) {
    alert("숫자 제대로 입력");
    return;
  }

  if (min >= max) {
    alert("최소값이 최대값보다 작아야 함!");
    return;
  }

  numbers = [];
  history = [];

  for (let i = min; i <= max; i++) {
    numbers.push(i);
  }

  isReady = true;

  document.getElementById("result").innerText = "준비 완료!";
  document.getElementById("history").innerText = "기록: 없음";
}

function draw() {
  if (!isReady) {
    alert("초기화부터 해줘!");
    return;
  }

  if (numbers.length === 0) {
    alert("더 이상 뽑을 숫자가 없음!");
    return;
  }

  let index = getCryptoRandomIndex(numbers.length);
  let num = numbers[index];

  numbers.splice(index, 1);
  history.push(num);

  document.getElementById("result").innerText = num;
  document.getElementById("history").innerText =
    "기록: " + history.join(", ");
}
</script>
