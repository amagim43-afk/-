<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>번호 추첨기</title>

  <style>
    body {
      text-align: center;
      font-family: sans-serif;
      margin-top: 60px;
      background: #000;
      color: white;
    }

    h1 {
      font-size: 32px;
    }

    input {
      font-size: 20px;
      padding: 10px;
      width: 80px;
      margin: 5px;
    }

    button {
      font-size: 20px;
      padding: 12px 25px;
      margin: 10px;
      border: none;
      border-radius: 10px;
      background: #00c853;
      color: white;
      cursor: pointer;
    }

    #result {
      font-size: 60px;
      margin-top: 30px;
      color: white;
    }

    #history {
      margin-top: 30px;
      font-size: 18px;
    }
  </style>
</head>

<body>

<h1>번호 추첨기 🎲</h1>

<input id="min" type="number" placeholder="최소">
<input id="max" type="number" placeholder="최대">

<br>

<button onclick="init()">초기화</button>
<button onclick="draw()">추첨</button>

<div id="result">?</div>
<div id="history">기록: 없음</div>

<script>
let numbers = [];
let history = [];
let isReady = false;

// 🎯 crypto 전용 랜덤
function getCryptoRandomIndex(max) {
  const array = new Uint32Array(1);
  crypto.getRandomValues(array);
  return array[0] % max;
}

function init() {
  let min = Number(document.getElementById("min").value);
  let max = Number(document.getElementById("max").value);

  if (!Number.isFinite(min) || !Number.isFinite(max)) {
    alert("숫자 제대로 입력");
    return;
  }

  if (min >= max) {
    alert("최소값이 최대값보다 작아야 함!");
    return;
  }

  numbers = [];
  history = [];

  for (let i = min; i <= max; i++) {
    numbers.push(i);
  }

  isReady = true;

  document.getElementById("result").innerText = "준비 완료!";
  document.getElementById("history").innerText = "기록: 없음";
}

function draw() {
  if (!isReady) {
    alert("초기화부터 해줘!");
    return;
  }

  if (numbers.length === 0) {
    alert("더 이상 뽑을 숫자가 없음!");
    return;
  }

  let index = getCryptoRandomIndex(numbers.length);
  let num = numbers[index];

  numbers.splice(index, 1);
  history.push(num);

  document.getElementById("result").innerText = num;
  document.getElementById("history").innerText = "기록: " + history.join(", ");
}
</script>

</body>
</html>
