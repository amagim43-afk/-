<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>번호 추첨기</title>

  <style>
    body {
      text-align: center;
      font-family: sans-serif;
      margin-top: 80px;
      background: #000;
      color: white;
    }

    h1 {
      font-size: 32px;
    }

    input {
      font-size: 20px;
      padding: 10px;
      width: 80px;
      margin: 5px;
    }

    button {
      font-size: 22px;
      padding: 12px 30px;
      margin: 10px;
      border: none;
      border-radius: 10px;
      background: #00c853;
      color: white;
    }

    #result {
      font-size: 60px;
      margin-top: 40px;
      color: #00e5ff;
    }
  </style>
</head>

<body>

<h1>번호 추첨기 🎲</h1>

<input id="min" type="number" placeholder="최소">
<input id="max" type="number" placeholder="최대">

<br>

<button onclick="init()">시작</button>
<button onclick="draw()">추첨!</button>

<div id="result">?</div>

<script>
let numbers = [];

function init() {
  let min = Number(document.getElementById("min").value);
  let max = Number(document.getElementById("max").value);

  if (isNaN(min) || isNaN(max)) {
    alert("숫자를 입력해!");
    return;
  }

  if (min >= max) {
    alert("최소값이 더 작아야 함!");
    return;
  }

  numbers = [];
  for (let i = min; i <= max; i++) {
    numbers.push(i);
  }

  document.getElementById("result").innerText = "시작!";
}

function draw() {
  if (numbers.length === 0) {
    alert("더 이상 뽑을 숫자가 없음!");
    return;
  }

  let index = Math.floor(Math.random() * numbers.length);
  let num = numbers[index];

  numbers.splice(index, 1);

  document.getElementById("result").innerText = num;
}
</script>

</body>
</html>
